<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>DSICOLA - Sistema de Gestão Escolar</title>
  <meta name="description" content="Sistema de gestão escolar completo para gestão de alunos, professores, cursos, notas e frequência." />
  <meta name="author" content="DSICOLA" />

  <!-- Preconnect to Google Fonts for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Load fonts with display=swap to prevent FOUC -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" />

  <meta property="og:title" content="DSICOLA - Sistema de Gestão Escolar" />
  <meta property="og:description" content="Gerencie cursos, turmas, notas e frequência de forma simples e eficiente." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@DSICOLA" />

  <!-- Favicon padrão DSICOLA (profissional) - instituições sobrescrevem dinamicamente via JS -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>

<body>
  <!-- Fallback: visível até o React montar; se JS falhar, o utilizador vê isto em vez de ecrã branco -->
  <div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;font-family:system-ui,sans-serif;color:#334155">
    <div style="text-align:center">
      <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#1e40af;border-radius:50%;animation:dsicola-spin 1s linear infinite;margin:0 auto 16px"></div>
      <p style="margin:0;font-size:14px">Carregando...</p>
    </div>
  </div>
  <style>@keyframes dsicola-spin{to{transform:rotate(360deg)}}</style>
  <!-- Container estável para portais (modais, dialogs, etc.) -->
  <div id="portal-root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
