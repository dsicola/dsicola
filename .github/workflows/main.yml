name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci_frontend:
    runs-on: ubuntu-latest
    env:
      # Mesmo motivo que ci.yml: workbox/terser ao gerar SW falha no runner com bundle grande
      SKIP_PWA: 'true'
      NODE_OPTIONS: '--max-old-space-size=6144'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend/
      - name: Run lint
        run: npm run lint
        working-directory: frontend/
      - name: Build project
        run: npm run build:ci
        working-directory: frontend/
      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-artifact
          path: frontend/dist

  ci_backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: dsicola_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/dsicola_ci?schema=public
      SUPER_ADMIN_EMAIL: superadmin@dsicola.com
      SUPER_ADMIN_PASSWORD: SuperAdmin@123
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend/
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend/
      - name: Push database schema
        run: npx prisma db push
        working-directory: backend/
      - name: Seed database (SUPER_ADMIN + multi-tenant)
        run: npm run db:seed && npm run seed:multi-tenant
        working-directory: backend/
      - name: Run tests
        run: npm run test
        working-directory: backend/
      - name: Build project
        run: npm run build
        working-directory: backend/
      - name: Upload Backend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-artifact
          path: backend/dist

  # Deploy: o projeto está no Railway — deploy automático via GitHub integration
